services:
  postgres:
    image: postgres:17.2
    container_name: kds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kds_dev
      POSTGRES_USER: kds_user
      POSTGRES_PASSWORD: kds_dev_password
    ports:
      - "5432:5432"
    volumes:
      - kds-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kds_user -d kds_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kds-postgres-data: