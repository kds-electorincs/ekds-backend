spring.application.name=kds-web
server.port=8080
spring.datasource.url=${KDS_DB_URL}
spring.datasource.username=${KDS_DB_USERNAME}
spring.datasource.password=${KDS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway owns the schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
logging.level.org.flywaydb=TRACE

#security
kds.security.jwt.secret=${KDS_JWT_SECRET}
kds.security.jwt.access-token-ttl=PT15M
kds.security.jwt.refresh-token-ttl=P30D
kds.security.jwt.issuer=kds-electronics