spring.application.name=kds-web
server.port=8080
spring.datasource.url=${KDS_DB_URL}
spring.datasource.username=${KDS_DB_USERNAME}
spring.datasource.password=${KDS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC